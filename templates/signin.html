{% extends 'base.html' %}
{% load static %}

{% block title %}Sign In{% endblock %}

{% block header %}{% endblock %}

{% block content %}
<section class="relative bg-gradient-to-b from-white from-10% dark:from-darkmode to-herobg to-90% dark:to-darklight min-h-screen flex items-center justify-center py-20 px-4">
    <div class="max-w-md w-full bg-white dark:bg-semidark rounded-2xl shadow-property p-8 md:p-12" data-aos="fade-up">
        <h2 class="text-2xl md:text-3xl font-bold text-midnight_text dark:text-white mb-2 text-center">Welcome Back</h2>
        <p class="text-gray-600 dark:text-gray-400 mb-8 text-center">Sign in to continue to your account</p>
        <form method="post" action="{% url 'signin' %}">
            {% csrf_token %}
            <div class="mb-6">
                <label for="email" class="block text-midnight_text dark:text-white font-medium mb-2">Email Address</label>
                <input type="email" id="email" name="email" required class="w-full px-4 py-3 rounded-lg border border-border dark:border-dark_border dark:bg-darkmode dark:text-white focus:border-primary dark:focus:border-primary focus:outline-none transition duration-300">
            </div>
            
            <div class="mb-6">
                <label for="password" class="block text-midnight_text dark:text-white font-medium mb-2">Password</label>
                <input type="password" id="password" name="password" required class="w-full px-4 py-3 rounded-lg border border-border dark:border-dark_border dark:bg-darkmode dark:text-white focus:border-primary dark:focus:border-primary focus:outline-none transition duration-300">
            </div>
            
            <div class="flex items-center justify-between mb-6">
                <label class="flex items-center">
                    <input type="checkbox" name="remember" class="w-4 h-4 text-primary border-border rounded focus:ring-primary">
                    <span class="ml-2 text-gray dark:text-gray-400">Remember me</span>
                </label>
                <a href="#" class="text-primary hover:underline">Forgot Password?</a>
            </div>
            
            <button type="submit" class="w-full py-4 px-6 bg-primary hover:bg-blue-700 text-white font-medium rounded-lg transition duration-300 mb-6">
                Sign In
            </button>
            
            <div class="text-center mb-6">
                <span class="text-gray dark:text-gray-400">or continue with</span>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <button type="button" class="flex items-center justify-center gap-2 py-3 px-4 border border-border dark:border-dark_border rounded-lg hover:bg-gray-50 dark:hover:bg-darkmode transition duration-300">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span class="text-midnight_text dark:text-white">Google</span>
                </button>
                <button type="button" class="flex items-center justify-center gap-2 py-3 px-4 border border-border dark:border-dark_border rounded-lg hover:bg-gray-50 dark:hover:bg-darkmode transition duration-300">
                    <svg class="w-5 h-5" fill="#1877F2" viewBox="0 0 24 24">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    <span class="text-midnight_text dark:text-white">Facebook</span>
                </button>
            </div>
            
            <p class="text-center text-gray dark:text-gray-400">
                Don't have an account? 
                <a href="{% url 'signup' %}" class="text-primary hover:underline font-medium">Sign Up</a>
            </p>
        </form>
    </div>
</section>
{% endblock %}
